services:
  - type: web
    name: carvalue-api
    plan: free
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && cd ../ml && python data_pipeline.py && python train_model.py"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.0"
